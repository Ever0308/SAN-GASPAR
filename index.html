<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1a56db">
  <title>San Gaspar | Finanzas</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --primary-50: #eff6ff; --primary-100: #dbeafe; --primary-200: #bfdbfe;
      --primary-400: #186dd5; --primary-500: #1651b1; --primary-600: #0d368d;
      --primary-700: #0d349e; --primary-800: #071645; --primary-900: #05143d;
      --success-500: #197e3e; --success-600: #0d5b29; --success-700: #065f46;
      --warning-600: #d97706; --danger-600: #dc2626;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-800: #1f2937;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 0.75rem; --radius-lg: 1.25rem;
      --transition: 200ms ease;
    }

    html, body {
      margin: 0; padding: 0;
      width: 100%; max-width: 100vw;
      overflow-x: hidden; overflow-y: auto;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    input, select, button { user-select: text; -webkit-user-select: text; }

    @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(-20px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

    body {
      background: linear-gradient(-45deg, #f0f4ff, #e0e7ff, #dbeafe);
      background-size: 300% 300%;
      animation: gradientShift 12s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; width: 100%;
      display: flex; align-items: flex-start; justify-content: center;
      color: var(--gray-800); line-height: 1.4;
      font-size: 14px;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .app-container { width: 100%; max-width: 100%; min-height: 100vh; }

    /* ========== MENÚ ========== */
    .menu-container {
      width: 100%; min-height: 100vh;
      padding: 1.5rem 1rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .content-wrapper {
      width: 100%; max-width: 100%;
      padding: 0 0.5rem;
      animation: float 5s ease-in-out infinite;
    }

    .logo-area {
      margin-bottom: 2rem;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      width: 100%;
    }

    .logo-svg {
      width: 90px; height: 90px;
      filter: drop-shadow(0 3px 8px rgba(13,52,158,0.2));
    }
    .logo-svg img {
      width: 100%; height: 100%;
      object-fit: contain; border-radius: 50%;
    }

    .logo-text {
      margin-top: 0.75rem;
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary-700), var(--primary-500));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.2;
    }

    .logo-sub {
      font-size: 0.8rem; color: var(--gray-600);
      margin-top: 0.25rem; font-weight: 500;
    }

    .buttons-group {
      display: flex; flex-direction: column;
      gap: 0.875rem; margin: 1.5rem 0;
      width: 100%; max-width: 100%;
    }
    @media (min-width: 480px) {
      .buttons-group { flex-direction: row; }
    }

    .btn {
      width: 100%;
      padding: 0.875rem 1rem;
      border: none; border-radius: var(--radius-lg);
      font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      transition: var(--transition); color: white;
      box-shadow: var(--shadow);
    }
    .btn-credito { background: linear-gradient(135deg, var(--primary-700), var(--primary-600)); }
    .btn-ahorros { background: linear-gradient(135deg, var(--success-600), var(--success-500)); }
    .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn:active { transform: scale(0.99); }
    .btn span:first-child { font-size: 1.1rem; }

    .footer-note {
      margin-top: 1.5rem; font-size: 0.7rem;
      color: var(--gray-500); text-align: center;
      padding-top: 0.75rem; border-top: 1px solid var(--gray-200);
    }

    /* ========== HEADER ========== */
    .header-modern {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; background: white;
      border-bottom: 1px solid var(--gray-200);
      position: sticky; top: 0; z-index: 50;
      box-shadow: var(--shadow); width: 100%;
      flex-wrap: nowrap;
    }

    .back-btn {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      color: white; border: none;
      padding: 0.5rem 1rem; border-radius: var(--radius);
      font-weight: 600; font-size: 0.85rem;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }

    .logo-small {
      width: 36px; height: 36px;
      border-radius: var(--radius); flex-shrink: 0;
    }

    .module h1 {
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(135deg, var(--primary-700), var(--primary-600));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin: 0; text-align: center;
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; padding: 0 0.5rem;
    }

    /* ========== FORMULARIOS ========== */
    .card-form-modern {
      background: linear-gradient(145deg, #0d349e, #05143d) !important;
      margin: 0.75rem; padding: 1rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: calc(100% - 1.5rem); max-width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card-form-ahorros {
      background: linear-gradient(145deg, #0d5b29, #065f46) !important;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .form-row {
      display: flex; flex-direction: column;
      gap: 0.75rem; width: 100%;
    }
    @media (min-width: 400px) {
      .form-row { flex-direction: row; flex-wrap: wrap; }
    }

    .input-group {
      flex: 1 1 100%; min-width: 0;
      display: flex; flex-direction: column;
      gap: 0.4rem;
    }
    @media (min-width: 400px) {
      .input-group { flex: 1 1 calc(50% - 0.375rem); }
    }

    .card-form-modern label {
      font-size: 0.65rem; text-transform: uppercase;
      font-weight: 700; color: rgba(255,255,255,0.9);
      letter-spacing: 0.3px;
    }

    .field-modern, .select-modern {
      width: 100%; padding: 0.6rem 0.75rem;
      border-radius: var(--radius); border: 2px solid transparent;
      background: white; font-size: 0.9rem;
      font-weight: 500; color: var(--gray-800); outline: none;
    }
    .field-modern::placeholder { color: #9ca3af; }
    .field-modern:focus, .select-modern:focus {
      border-color: var(--warning-600);
      box-shadow: 0 0 0 3px rgba(217,119,6,0.2);
    }
    .select-modern {
      appearance: none;
      background-image: url("image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat; background-size: 1em 1em;
      padding-right: 2rem;
    }

    .btn-generar {
      background: linear-gradient(135deg, var(--success-600), var(--success-500));
      color: white; border: none;
      padding: 0.75rem; border-radius: var(--radius-lg);
      font-weight: 700; cursor: pointer;
      width: 100%; margin-top: 0.75rem;
      font-size: 0.9rem; box-shadow: var(--shadow);
    }
    .btn-generar:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }

    /* ========== TABLAS ========== */
    .table-container {
      padding: 0 0.75rem 1rem;
      width: 100%; overflow: hidden;
    }

    .financing-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      font-size: clamp(0.65rem, 2.8vw, 0.82rem);
      table-layout: fixed;
    }

    .financing-table thead {
      background: linear-gradient(135deg, var(--primary-800), var(--primary-700));
    }

    .financing-table th {
      color: white;
      padding: clamp(0.4rem, 1.5vw, 0.6rem) clamp(0.3rem, 1vw, 0.5rem);
      text-align: center; font-weight: 700;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .financing-table td {
      padding: clamp(0.4rem, 1.5vw, 0.6rem) clamp(0.3rem, 1vw, 0.5rem);
      border-bottom: 1px solid var(--gray-100);
      text-align: center; font-weight: 500;
      white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .financing-table tbody tr:last-child td { border-bottom: none; }
    .financing-table tbody tr:hover { background: var(--primary-50); }

    .col-plazo { color: var(--primary-700); font-weight: 700; }
    .col-cuota { color: var(--success-600); font-weight: 700; }
    .col-interes { color: var(--warning-600); font-weight: 600; }
    .col-total { color: var(--primary-800); font-weight: 800; }

    /* Tabla calendario */
    .tabla-calendario {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-top: 0.75rem;
      font-size: clamp(0.6rem, 2.5vw, 0.78rem);
      table-layout: fixed;
    }

    .tabla-calendario thead {
      background: linear-gradient(135deg, var(--primary-800), var(--primary-700));
    }

    .tabla-calendario th {
      color: white;
      padding: clamp(0.35rem, 1.2vw, 0.5rem) clamp(0.2rem, 0.8vw, 0.4rem);
      text-align: center; font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .tabla-calendario td {
      padding: clamp(0.35rem, 1.2vw, 0.5rem) clamp(0.2rem, 0.8vw, 0.4rem);
      border-bottom: 1px solid var(--gray-100);
      text-align: center;
      white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .tabla-calendario tbody tr:hover { background: var(--primary-50); }
    .tabla-calendario tfoot { background: var(--gray-100); font-weight: 700; }

    .info-box {
      background: linear-gradient(135deg, var(--primary-50), white);
      border-left: 3px solid var(--primary-500);
      padding: 0.75rem 1rem;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      box-shadow: var(--shadow);
      line-height: 1.5;
    }
    .info-box strong { color: var(--primary-800); }

    .dias-calculo {
      background: var(--primary-100);
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--primary-800);
      font-weight: 600;
      text-align: center;
      border: 1px solid var(--primary-200);
    }

    .btn-imprimir {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      color: white; border: none;
      padding: 0.75rem; border-radius: var(--radius-lg);
      font-weight: 700; cursor: pointer;
      width: 100%; margin-top: 0.75rem;
      font-size: 0.9rem; box-shadow: var(--shadow);
    }

    .footer-text {
      text-align: center; font-size: 0.65rem;
      color: var(--gray-500); padding: 0.75rem;
      border-top: 1px solid var(--gray-200);
      background: white;
    }

    /* Módulos */
    .module {
      display: none;
      width: 100%; min-height: 100vh;
      background: white;
    }
    .module.active-module { display: block; }

    /* 🚨 ALERTA PERSONALIZADA */
    .custom-alert-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .custom-alert-overlay.active { display: flex; }
    
    .custom-alert {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      max-width: 90%;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }
    
    .custom-alert-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--primary-100);
    }
    
    .custom-alert-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem; flex-shrink: 0;
    }
    
    .custom-alert-title {
      font-size: 1.1rem; font-weight: 700;
      color: var(--primary-800); margin: 0;
    }
    
    .custom-alert-message {
      font-size: 0.95rem; color: var(--gray-700);
      line-height: 1.5; margin-bottom: 1.25rem;
    }
    
    .custom-alert-button {
      width: 100%; padding: 0.75rem;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      color: white; border: none;
      border-radius: var(--radius);
      font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: var(--transition);
    }
    .custom-alert-button:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .custom-alert-button:active { transform: scale(0.98); }

    /* 🖨️ Impresión */
    @media print {
      body { background: white !important; padding: 0 !important; font-size: 9pt !important; }
      .card-form-modern, .btn-generar, .btn-imprimir, .footer-text, 
      .header-modern .back-btn, .dias-calculo, .menu-container, .footer-note,
      .custom-alert-overlay { display: none !important; }
      .module.active-module { display: block !important; background: white; }
      .financing-table, .tabla-calendario {
        box-shadow: none !important; border: 1px solid #000 !important; font-size: 8pt !important;
      }
      .financing-table th, .tabla-calendario th {
        background: #1e40af !important; color: white !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact;
      }
    }

    @media screen and (-webkit-min-device-pixel-ratio: 0) {
      input, select { font-size: 16px !important; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- MENÚ PRINCIPAL -->
  <div id="menuPrincipal" class="menu-container">
    <div class="content-wrapper">
      <div class="logo-area">
        <div class="logo-svg">
          <img src="logo.png" alt="San Gaspar">
        </div>
        <div class="logo-text">SAN GASPAR R.L.</div>
        <div class="logo-sub">COOPERATIVA DE AHORRO Y CRÉDITO</div>
      </div>
      <div class="buttons-group">
        <button id="btnCredito" class="btn btn-credito">
          <span>💳</span><span>Crédito</span>
        </button>
        <button id="btnAhorros" class="btn btn-ahorros">
          <span>🏦</span><span>Ahorros</span>
        </button>
      </div>
      <div class="footer-note">📱 Cotizador | Crédito · Ahorros</div>
    </div>
  </div>

  <!-- MÓDULO CRÉDITOS -->
  <div id="module-creditos" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">← Volver</button>
      <h1>COTIZADOR DE CRÉDITOS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none'" alt="logo">
    </div>
    <div class="card-form-modern">
      <div class="form-row">
        <div class="input-group">
          <label>💰 MONTO</label>
          <input type="text" id="monto" class="field-modern" placeholder="1,000" inputmode="decimal">
        </div>
        <div class="input-group">
          <label>📊 TASA</label>
          <select id="tasa" class="select-modern">
            <option value="24">2.00% PRINCIPAL</option>
            <option value="20">1.67% DEPOSITARIA</option>
            <option value="20">1.67% MASVI</option>
            <option value="27.60">2.30% INMEDIATO</option>
          </select>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="financing-table" id="tablaResultados">
        <thead>
          <tr>
            <th>PLAZO</th>
            <th>CUOTA</th>
            <th>INTERÉS</th>
            <th>TOTAL</th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr><td colspan="4" style="text-align:center;padding:1rem">💰 Ingrese un monto</td></tr>
        </tbody>
      </table>
    </div>
    <div class="footer-text">COTIZADOR SG v2.1</div>
  </div>

  <!-- MÓDULO AHORROS -->
  <div id="module-ahorros" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">← Volver</button>
      <h1>COTIZADOR DE AHORROS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none'" alt="logo">
    </div>
    <div class="card-form-modern card-form-ahorros">
      <div class="form-row">
        <div class="input-group">
          <label>🏦 PRODUCTO</label>
          <select id="productoAhorro" class="select-modern">
            <option value="">Seleccione...</option>
            <option value="corriente">A. Corriente (6%)</option>
            <option value="infanto">A. Infanto (5%)</option>
            <option value="programado">Ahorro Programado (Capitalizable)</option>
            <option value="plazofijo">Plazo Fijo</option>
            <option value="plazofijo_pref">PF Preferencial</option>
            <option value="inversion_f1">Inversiones F.I</option>
            <option value="inversion_f2">Inversiones F.II</option>
          </select>
        </div>
        <div class="input-group" id="cuotaGroup" style="display:none">
          <label>💰 CUOTA MENSUAL</label>
          <input type="text" id="cuotaMensual" class="field-modern" placeholder="200" inputmode="decimal">
        </div>
        <div class="input-group" id="montoGroup">
          <label>💰 MONTO</label>
          <input type="text" id="montoAhorro" class="field-modern" placeholder="10,000" inputmode="decimal">
        </div>
        <div class="input-group" id="plazoGroup" style="display:none">
          <label>⏱️ PLAZO</label>
          <select id="plazoAhorro" class="select-modern">
            <option value="6">6 MESES</option>
            <option value="12">12 MESES</option>
            <option value="24">24 MESES</option>
          </select>
        </div>
        <div class="input-group" id="plazoProgramadoGroup" style="display:none">
          <label>⏱️ PLAZO (MESES)</label>
          <select id="plazoProgramado" class="select-modern">
            <option value="12">12 MESES (8% anual)</option>
            <option value="24">24 MESES (8.5% anual)</option>
            <option value="36">36 MESES (9% anual)</option>
            <option value="48">48 MESES (10% anual)</option>
          </select>
        </div>
        <div class="input-group" id="frecuenciaGroup" style="display:none">
          <label>📅 MODALIDAD</label>
          <select id="frecuenciaAhorro" class="select-modern">
            <option value="mensual">Mensual</option>
            <option value="trimestral">Trimestral</option>
            <option value="semestral">Semestral</option>
            <option value="anual">Anual</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="fechasGroup" style="display:none">
        <div class="input-group">
          <label>📅 INICIO</label>
          <input type="date" id="fechaInicioAhorro" class="field-modern">
        </div>
        <div class="input-group">
          <label>📅 FINAL</label>
          <input type="date" id="fechaFinAhorro" class="field-modern">
        </div>
      </div>
      <button id="btnGenerarAhorro" class="btn-generar">🧮 Generar</button>
    </div>
    <div class="table-container" id="resultadosAhorro" style="display:none">
      <div id="diasCalculoContainer" class="dias-calculo" style="display:none"></div>
      <div id="tablaCalendarioContainer"></div>
      <div id="infoBoxAhorro" class="info-box"></div>
      <button id="btnImprimirAhorro" class="btn-imprimir" style="display:none">🖨️ Imprimir</button>
    </div>
    <div class="footer-text">COTIZADOR SG · ISR 10%</div>
  </div>

  <!-- 🚨 MODAL DE ALERTA PERSONALIZADO -->
  <div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert">
      <div class="custom-alert-header">
        <div class="custom-alert-icon" id="alertIcon">⚠️</div>
        <h3 class="custom-alert-title">San Gaspar R.L.</h3>
      </div>
      <div class="custom-alert-message" id="alertMessage">Mensaje</div>
      <button class="custom-alert-button" onclick="cerrarAlerta()">Aceptar</button>
    </div>
  </div>
</div>

<script>
  const menuPrincipal = document.getElementById('menuPrincipal');
  const moduleCredito = document.getElementById('module-creditos');
  const moduleAhorro = document.getElementById('module-ahorros');

  // ========== FUNCIONES DE ALERTA PERSONALIZADA ==========
  function mostrarAlerta(mensaje, tipo = 'warning') {
    const alert = document.getElementById('customAlert');
    const message = document.getElementById('alertMessage');
    const icon = document.getElementById('alertIcon');
    const iconos = { warning: '⚠️', error: '❌', success: '✅', info: 'ℹ️' };
    message.textContent = mensaje;
    icon.textContent = iconos[tipo] || iconos.warning;
    alert.classList.add('active');
  }

  function cerrarAlerta() {
    document.getElementById('customAlert').classList.remove('active');
  }

  document.getElementById('customAlert').addEventListener('click', function(e) {
    if (e.target === this) cerrarAlerta();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') cerrarAlerta();
  });

  // ========== NAVEGACIÓN ==========
  function navegarA(vista) {
    menuPrincipal.style.display = 'none';
    moduleCredito.classList.remove('active-module');
    moduleAhorro.classList.remove('active-module');
    if (vista === 'credito') {
      moduleCredito.classList.add('active-module');
      renderizarTablaCreditos();
    } else if (vista === 'ahorro') {
      moduleAhorro.classList.add('active-module');
      document.getElementById('resultadosAhorro').style.display = 'none';
    } else {
      menuPrincipal.style.display = 'flex';
    }
    history.pushState({ vista: vista || 'menu' }, '', '#' + (vista || 'menu'));
  }

  window.addEventListener('popstate', function(e) {
    const estado = e.state;
    if (estado?.vista === 'credito') {
      moduleCredito.classList.add('active-module');
      moduleAhorro.classList.remove('active-module');
      menuPrincipal.style.display = 'none';
      renderizarTablaCreditos();
    } else if (estado?.vista === 'ahorro') {
      moduleAhorro.classList.add('active-module');
      moduleCredito.classList.remove('active-module');
      menuPrincipal.style.display = 'none';
      document.getElementById('resultadosAhorro').style.display = 'none';
    } else {
      mostrarMenu();
    }
  });

  window.mostrarMenu = function() {
    menuPrincipal.style.display = 'flex';
    moduleCredito.classList.remove('active-module');
    moduleAhorro.classList.remove('active-module');
    history.replaceState({ vista: 'menu' }, '', '#menu');
  }

  document.getElementById('btnCredito').onclick = (e) => { e.preventDefault(); navegarA('credito'); };
  document.getElementById('btnAhorros').onclick = (e) => { e.preventDefault(); navegarA('ahorro'); };

  // ==================== CRÉDITOS ====================
  const plazosMeses = [12,18,24,36,48,60,72,84,96,108,120];

  function formatMoney(v) {
    if (isNaN(v) || v === null) return "Q 0.00";
    return "Q " + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function cleanNumber(v) {
    if (!v || v === "") return 0;
    const n = parseFloat(String(v).replace(/[^0-9.]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function calcularCuota(monto, tasaAnual, meses) {
    if (monto <= 0 || meses <= 0) return 0;
    const tasaMensual = (tasaAnual / 100) / 12;
    if (tasaMensual === 0) return monto / meses;
    const f = Math.pow(1 + tasaMensual, meses);
    return monto * (tasaMensual * f) / (f - 1);
  }

  function renderizarTablaCreditos() {
    const monto = cleanNumber(document.getElementById("monto").value);
    const tbody = document.getElementById("tablaBody");
    if (monto === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:1rem">💰 Ingrese un monto</td></tr>`;
      return;
    }
    const tasa = parseFloat(document.getElementById("tasa").value);
    let html = "";
    for (let m of plazosMeses) {
      const cuota = calcularCuota(monto, tasa, m);
      if (isNaN(cuota)) continue;
      const total = cuota * m;
      const interes = total - monto;
      html += `<tr>
        <td class="col-plazo">${m}M</td>
        <td class="col-cuota">${formatMoney(cuota)}</td>
        <td class="col-interes">${formatMoney(interes)}</td>
        <td class="col-total">${formatMoney(total)}</td>
      </tr>`;
    }
    tbody.innerHTML = html;
  }

  const montoInput = document.getElementById("monto");
  montoInput.addEventListener("input", renderizarTablaCreditos);
  montoInput.addEventListener("blur", function() {
    const v = cleanNumber(this.value);
    if (v > 0) this.value = formatMoney(v);
    renderizarTablaCreditos();
  });
  document.getElementById("tasa").onchange = renderizarTablaCreditos;

  // ==================== AHORROS ====================
  const productosAhorro = {
    corriente: { tasa: 6, min: 100, requiereFechas: true, nombre: "Ahorro Corriente", muestraDias: true },
    infanto: { tasa: 5, min: 100, requiereFechas: true, nombre: "Infanto Juvenil", muestraDias: true },
    programado: { 
      min: 200, requiereFechas: false, nombre: "Ahorro Programado", 
      requiereTabla: false, muestraImprimir: false, esProgramado: true,
      tasas: { 12: 8, 24: 8.5, 36: 9, 48: 10 }
    },
    plazofijo: {
      min: 1000, requiereFechas: false, nombre: "Plazo Fijo", muestraImprimir: false,
      rangos: [
        { desde: 1000, hasta: 99999.99, tasas: { 6: 12, 12: 14, 24: 'NA' } },
        { desde: 100000, hasta: 1999999.99, tasas: { 6: 14, 12: 14, 24: 15 } },
        { desde: 2000000, hasta: Infinity, tasas: { 6: 14, 12: 15, 24: 16 } }
      ]
    },
    plazofijo_pref: {
      min: 50000, requiereFechas: false, nombre: "Plazo Fijo Pref.", requiereTabla: true, muestraImprimir: true,
      rangos: [
        { desde: 50000, hasta: 99999.99, tasas: { 6: 11, 12: 13, 24: 'NA' } },
        { desde: 100000, hasta: 1999999.99, tasas: { 6: 12, 12: 13, 24: 14 } },
        { desde: 2000000, hasta: Infinity, tasas: { 6: 13, 12: 14, 24: 15 } }
      ],
      frecuencias: ['mensual','trimestral','semestral','anual']
    },
    inversion_f1: { min: 1000000, tasa: 10.5, requiereFechas: false, nombre: "Inversiones F.I", muestraImprimir: false },
    inversion_f2: {
      min: 1000000, tasa: 10, requiereFechas: false, nombre: "Inversiones F.II", requiereTabla: true, muestraImprimir: true,
      frecuencias: ['mensual','trimestral','semestral']
    }
  };

  let ultimoResultado = null, ultimoProducto = null;

  function diferenciaDias(f1, f2) { return Math.ceil(Math.abs(f2 - f1) / (1000*60*60*24)); }
  function agregarMeses(fecha, meses) { const n = new Date(fecha); n.setMonth(n.getMonth() + meses); return n; }

  function formatearFecha(f) {
    const d = String(f.getDate()).padStart(2,'0');
    const m = String(f.getMonth()+1).padStart(2,'0');
    const y = f.getFullYear();
    return `${d}-${m}-${y}`;
  }

  function validarMontoPlazo(prod, monto, plazo) {
    const cfg = productosAhorro[prod];
    if (!cfg.rangos) return { valido: true, tasa: cfg.tasa };
    const rango = cfg.rangos.find(r => monto >= r.desde && monto <= r.hasta);
    if (!rango) return { valido: false, msg: "Monto no aplica" };
    const tasa = rango.tasas[plazo];
    if (!tasa || tasa === 'NA') return { valido: false, msg: "Plazo no disponible" };
    return { valido: true, tasa };
  }

  function calcularProgramado(cuotaMensual, plazoMeses) {
    const tasas = productosAhorro.programado.tasas;
    const tasaAnual = tasas[plazoMeses] / 100;
    const tasaMensual = tasaAnual / 12;
    
    let saldo = 0;
    let totalAportado = 0;
    let interesBrutoTotal = 0;
    let isrTotal = 0;
    
    for (let mes = 1; mes <= plazoMeses; mes++) {
      saldo += cuotaMensual;
      totalAportado += cuotaMensual;
      
      const interesMes = saldo * tasaMensual;
      interesBrutoTotal += interesMes;
      
      const isrMes = interesMes * 0.10;
      isrTotal += isrMes;
      
      const interesNetoMes = interesMes - isrMes;
      saldo += interesNetoMes;
    }
    
    return {
      aportado: totalAportado,
      bruto: interesBrutoTotal,
      isr: isrTotal,
      neto: interesBrutoTotal - isrTotal,
      total: saldo,
      tasa: tasaAnual * 100,
      plazo: plazoMeses,
      cuota: cuotaMensual
    };
  }

  function generarTablaCalendario(r, prod) {
    const cfg = productosAhorro[prod];
    if (!cfg.requiereTabla || !r.frecuencia || !r.plazo) return '';
    
    const freq = { 'mensual':1, 'trimestral':3, 'semestral':6, 'anual':12 };
    const per = freq[r.frecuencia] || 12;
    const total = Math.floor(r.plazo / per);
    const brutoPer = r.bruto / total;
    const isrPer = r.isr / total;
    
    let html = `<h4 style="margin:1rem 0 0.5rem;text-align:center;font-weight:700;color:var(--primary-700)">📅 Calendario - ${cfg.nombre}</h4>
    <table class="tabla-calendario"><thead><tr><th>#</th><th>Fecha</th><th>Bruto</th><th>ISR</th><th>Neto</th></tr></thead><tbody>`;
    
    let fecha = new Date();
    for (let i=1; i<=total; i++) {
      html += `<tr>
        <td>${i}</td>
        <td>${formatearFecha(fecha)}</td>
        <td>${formatMoney(brutoPer)}</td>
        <td style="color:#dc2626">-${formatMoney(isrPer)}</td>
        <td style="color:#16a34a;font-weight:700">${formatMoney(brutoPer-isrPer)}</td>
      </tr>`;
      fecha = agregarMeses(fecha, per);
    }
    html += `<tfoot><tr>
      <td colspan="2"><strong>TOTAL</strong></td>
      <td><strong>${formatMoney(r.bruto)}</strong></td>
      <td><strong style="color:#dc2626">-${formatMoney(r.isr)}</strong></td>
      <td><strong style="color:#16a34a">${formatMoney(r.neto)}</strong></td>
    </tr></tfoot></table>`;
    return html;
  }

  function calcularAhorro() {
    const prod = document.getElementById('productoAhorro').value;
    if (!prod) { mostrarAlerta('Seleccione un producto', 'warning'); return; }
    const cfg = productosAhorro[prod];
    
    // Ahorro Programado
    if (prod === 'programado') {
      const cuota = cleanNumber(document.getElementById('cuotaMensual').value);
      const plazo = parseInt(document.getElementById('plazoProgramado').value);
      
      if (cuota < cfg.min || cuota === 0) { 
        mostrarAlerta(`La cuota mínima es ${formatMoney(cfg.min)}`, 'warning'); 
        return; 
      }
      
      const resultado = calcularProgramado(cuota, plazo);
      ultimoResultado = resultado;
      ultimoProducto = prod;
      mostrarResultadoProgramado(resultado);
      return;
    }
    
    // Otros productos
    const monto = cleanNumber(document.getElementById('montoAhorro').value);
    if (monto < cfg.min || monto === 0) { mostrarAlerta(`Mínimo: ${formatMoney(cfg.min)}`, 'warning'); return; }

    let res = { monto };
    if (prod === 'corriente' || prod === 'infanto') {
      const f1 = new Date(document.getElementById('fechaInicioAhorro').value);
      const f2 = new Date(document.getElementById('fechaFinAhorro').value);
      if (isNaN(f1) || isNaN(f2) || f2 <= f1) { mostrarAlerta('Verifique las fechas', 'warning'); return; }
      const dias = diferenciaDias(f1, f2);
      const bruto = monto * (cfg.tasa/100) * (dias/365);
      const isr = bruto * 0.10;
      res = { ...res, tasa: cfg.tasa, dias, bruto, isr, neto: bruto-isr, total: monto+bruto-isr };
      mostrarResultadoAhorro(res, prod);
    } else {
      const plazo = parseInt(document.getElementById('plazoAhorro').value);
      if (!plazo) { mostrarAlerta('Seleccione un plazo', 'warning'); return; }
      const valid = validarMontoPlazo(prod, monto, plazo);
      if (!valid.valido) { mostrarAlerta(valid.msg, 'warning'); return; }
      const bruto = monto * (valid.tasa/100) * (plazo/12);
      const isr = bruto * 0.10;
      const freq = (cfg.frecuencias && document.getElementById('frecuenciaAhorro')) ? document.getElementById('frecuenciaAhorro').value : null;
      res = { ...res, plazo, tasa: valid.tasa, frecuencia: freq, bruto, isr, neto: bruto-isr, total: monto+bruto-isr };
      mostrarResultadoAhorro(res, prod);
    }
    ultimoResultado = res;
    ultimoProducto = prod;
  }

  function mostrarResultadoProgramado(r) {
    const container = document.getElementById('resultadosAhorro');
    const calContainer = document.getElementById('tablaCalendarioContainer');
    const infoBox = document.getElementById('infoBoxAhorro');
    const btnImprimir = document.getElementById('btnImprimirAhorro');
    const diasContainer = document.getElementById('diasCalculoContainer');
    
    diasContainer.style.display = 'none';
    calContainer.innerHTML = '';
    btnImprimir.style.display = 'none';
    
    const html = `
      <h4 style="margin:0.5rem 0;text-align:center;font-weight:700;color:var(--primary-700)">📊 Ahorro Programado</h4>
      <table class="financing-table" style="margin-top:0.5rem">
        <tbody>
          <tr><td class="label" style="text-align:left">Cuota Mensual</td><td style="text-align:right;font-weight:700">${formatMoney(r.cuota)}</td></tr>
          <tr><td class="label" style="text-align:left">Plazo</td><td style="text-align:right;font-weight:700">${r.plazo} MESES</td></tr>
          <tr><td class="label" style="text-align:left">Tasa Anual</td><td style="text-align:right;font-weight:700">${r.tasa}%</td></tr>
          <tr><td class="label" style="text-align:left">Total Aportado</td><td style="text-align:right">${formatMoney(r.aportado)}</td></tr>
          <tr><td class="label" style="text-align:left">Intereses Brutos</td><td style="text-align:right">${formatMoney(r.bruto)}</td></tr>
          <tr><td class="label" style="text-align:left">ISR (10%)</td><td style="text-align:right;color:#dc2626">- ${formatMoney(r.isr)}</td></tr>
          <tr><td class="label" style="text-align:left;font-weight:700">Intereses Netos</td><td style="text-align:right;color:#16a34a;font-weight:700">${formatMoney(r.neto)}</td></tr>
          <tr style="background:linear-gradient(135deg, #1e40af, #1e3a8a);color:white"><td class="label" style="text-align:left;font-weight:800">MONTO FINAL</td><td style="text-align:right;font-weight:800">${formatMoney(r.total)}</td></tr>
        </tbody>
      </table>
    `;
    
    infoBox.innerHTML = `<strong>ℹ️ Ahorro Programado - Capitalización Mensual</strong><br>
      • Cuota: ${formatMoney(r.cuota)}<br>
      • Plazo: ${r.plazo} meses<br>
      • Tasa: ${r.tasa}% anual<br>
      • ISR: 10% sobre intereses generados cada mes`;
    
    container.style.display = 'block';
    infoBox.innerHTML = html + infoBox.innerHTML;
  }

  function mostrarResultadoAhorro(r, prod) {
    const container = document.getElementById('resultadosAhorro');
    const calContainer = document.getElementById('tablaCalendarioContainer');
    const infoBox = document.getElementById('infoBoxAhorro');
    const btnImprimir = document.getElementById('btnImprimirAhorro');
    const diasContainer = document.getElementById('diasCalculoContainer');
    const cfg = productosAhorro[prod];
    
    if (cfg.muestraDias && r.dias) {
      const f1 = document.getElementById('fechaInicioAhorro').value;
      const f2 = document.getElementById('fechaFinAhorro').value;
      diasContainer.style.display = 'block';
      diasContainer.innerHTML = `📆 ${r.dias} días (${f1} a ${f2})`;
    } else { diasContainer.style.display = 'none'; }
    
    if (cfg.requiereTabla && r.frecuencia && r.plazo) {
      calContainer.innerHTML = generarTablaCalendario(r, prod);
    } else { calContainer.innerHTML = ''; }
    
    btnImprimir.style.display = cfg.muestraImprimir ? 'block' : 'none';
    
    infoBox.innerHTML = `<strong>ℹ️ Resumen:</strong><br>
      • ${cfg.nombre}<br>
      • Monto: <strong>${formatMoney(r.monto)}</strong><br>
      • Tasa: <strong>${r.tasa}%</strong><br>
      • Bruto: ${formatMoney(r.bruto)}<br>
      • ISR: <span style="color:#dc2626">-${formatMoney(r.isr)}</span><br>
      • Neto: <span style="color:#16a34a;font-weight:700">${formatMoney(r.neto)}</span><br>
      • <strong style="color:var(--primary-800)">Total: ${formatMoney(r.total)}</strong>`;
    
    container.style.display = 'block';
  }

  function imprimirAhorro() {
    if (!ultimoResultado) { mostrarAlerta('Genere la cotización primero', 'warning'); return; }
    window.print();
  }

  function actualizarCamposAhorro() {
    const prod = document.getElementById('productoAhorro').value;
    document.getElementById('plazoGroup').style.display = 'none';
    document.getElementById('plazoProgramadoGroup').style.display = 'none';
    document.getElementById('frecuenciaGroup').style.display = 'none';
    document.getElementById('fechasGroup').style.display = 'none';
    document.getElementById('cuotaGroup').style.display = 'none';
    document.getElementById('montoGroup').style.display = 'flex';
    document.getElementById('resultadosAhorro').style.display = 'none';
    document.getElementById('tablaCalendarioContainer').innerHTML = '';
    
    if (!prod) return;
    const cfg = productosAhorro[prod];
    
    if (prod === 'programado') {
      document.getElementById('cuotaGroup').style.display = 'flex';
      document.getElementById('montoGroup').style.display = 'none';
      document.getElementById('plazoProgramadoGroup').style.display = 'flex';
    } else if (prod === 'corriente' || prod === 'infanto') {
      document.getElementById('fechasGroup').style.display = 'flex';
      document.getElementById('fechaInicioAhorro').value = new Date().toISOString().split('T')[0];
      document.getElementById('fechaFinAhorro').value = '';
    } else {
      document.getElementById('plazoGroup').style.display = 'flex';
      if (cfg.frecuencias) { document.getElementById('frecuenciaGroup').style.display = 'flex'; }
    }
  }

  function setupMoneyInput(id) {
    const input = document.getElementById(id);
    if (!input) return;
    let num = '';
    input.addEventListener('input', function(e) {
      let v = e.target.value.replace(/[^0-9.]/g, '');
      const parts = v.split('.');
      if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
      if (parts[1]?.length > 2) v = parts[0] + '.' + parts[1].substring(0,2);
      num = v; e.target.value = v;
    });
    input.addEventListener('blur', function(e) {
      if (num && !isNaN(parseFloat(num))) { e.target.value = formatMoney(parseFloat(num)); }
      else { e.target.value = ''; num = ''; }
    });
    input.addEventListener('focus', function(e) { e.target.value = num; });
  }

  document.getElementById('productoAhorro').onchange = actualizarCamposAhorro;
  document.getElementById('btnGenerarAhorro').onclick = calcularAhorro;
  document.getElementById('btnImprimirAhorro').onclick = imprimirAhorro;
  setupMoneyInput('montoAhorro');
  setupMoneyInput('cuotaMensual');

  window.addEventListener('DOMContentLoaded', () => {
    history.replaceState({ vista: 'menu' }, '', '#menu');
    document.getElementById('monto').value = '';
    document.getElementById('montoAhorro').value = '';
    document.getElementById('cuotaMensual').value = '';
    renderizarTablaCreditos();
    actualizarCamposAhorro();
    mostrarMenu();
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
      navigator.serviceWorker.register("service-worker.js").catch(e => console.log("SW:", e));
    });
  }
</script>
</body>
</html>
