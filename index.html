<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0f4c81">
  <title>San Gaspar | Finanzas</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #dce3ec 0%, #c2d0e6 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', 'Roboto', sans-serif;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    /* Contenedor principal que ocupa toda la pantalla */
    .app-container {
      width: 100%;
      min-height: 100vh;
      background: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ========== MENÚ PRINCIPAL ========== */
    .menu-container {
      width: 100%;
      min-height: 100vh;
      background: white;
      padding: 1.8rem 1.5rem 2.2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-area {
      margin-bottom: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .logo-svg {
      width: 110px;
      height: 110px;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.12));
    }

    .logo-text {
      margin-top: 0.7rem;
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1E3C72, #2A5298);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logo-sub {
      font-size: 0.9rem;
      color: #4a627a;
      font-weight: 500;
      margin-top: 0.2rem;
    }

    .buttons-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      justify-content: center;
      margin: 1.2rem 0 0.8rem;
    }

    @media (min-width: 500px) and (max-width: 1024px) {
      .buttons-group {
        flex-direction: row;
        gap: 1.3rem;
      }
    }

    .btn {
      width: 100%;
      padding: 1rem 1rem;
      border: none;
      border-radius: 3rem;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }

    .btn-credito {
      background: linear-gradient(105deg, #1b3b6f, #2c5282);
      color: white;
      border-bottom: 3px solid #ffd966;
    }

    .btn-credito:active {
      transform: scale(0.97);
    }

    .btn-ahorros {
      background: linear-gradient(105deg, #2b6e4c, #1e5940);
      color: white;
      border-bottom: 3px solid #f9f3c1;
    }

    .btn-ahorros:active {
      transform: scale(0.97);
    }

    .btn-icon {
      font-size: 1.8rem;
    }

    .feedback {
      margin-top: 1.8rem;
      padding: 1rem;
      background: #f8fafd;
      border-radius: 1.8rem;
      font-size: 1rem;
      font-weight: 500;
      color: #1e2f41;
      border-left: 6px solid #2c5282;
      text-align: center;
    }

    .footer-note {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: #5d6f88;
      border-top: 1px solid #e2e8f0;
      padding-top: 0.8rem;
      text-align: center;
    }

    /* ========== MÓDULOS (Créditos y Ahorros) ========== */
    .module {
      display: none;
      width: 100%;
      min-height: 100vh;
      background: white;
    }

    .module.active-module {
      display: block;
    }

    /* Header común para módulos */
    .header-modern {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: white;
      border-bottom: 2px solid #f0f2f5;
    }

    .back-btn {
      background: #0f4c81;
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .logo-small {
      width: 50px;
      height: auto;
    }

    .module h1 {
      font-size: 1.5rem;
      color: #0f4c81;
    }

    /* Formularios */
    .card-form-modern {
      background: #0f4c81;
      margin: 1.5rem;
      padding: 1.5rem;
      border-radius: 1rem;
    }

    .card-form-ahorros {
      background: #065f46;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }

    .input-group {
      flex: 1;
      min-width: 180px;
    }

    .card-form-modern label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 0.5rem;
    }

    .field-modern, .select-modern {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.8rem;
      border: none;
      background: white;
      font-size: 0.9rem;
      font-weight: 500;
      color: #0a2b44;
      outline: none;
    }

    .btn-generar {
      background: #28a745;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }

    .btn-imprimir {
      background: #0056b3;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 2rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }

    .table-container {
      padding: 0 1.5rem 1.5rem;
      overflow-x: auto;
    }

    .financing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      border: 1px solid #e1e8f0;
    }

    .financing-table th {
      background: #0f4c81;
      color: white;
      padding: 0.8rem;
      text-align: center;
    }

    .financing-table td {
      padding: 0.8rem;
      border: 1px solid #e1e8f0;
      text-align: center;
    }

    .tabla-calendario {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 0.75rem;
      border: 1px solid #e1e8f0;
    }

    .tabla-calendario th {
      background: #0f4c81;
      color: white;
      padding: 8px;
    }

    .tabla-calendario td {
      padding: 6px;
      border: 1px solid #e1e8f0;
      text-align: center;
    }

    .info-box {
      background: #e8f4f8;
      border-left: 4px solid #0f4c81;
      padding: 12px;
      border-radius: 0.5rem;
      margin-top: 15px;
      font-size: 0.85rem;
    }

    .footer-text {
      text-align: center;
      font-size: 0.65rem;
      color: #6c86a3;
      padding: 1rem;
      border-top: 1px solid #e1e8f0;
    }

    .col-plazo { color: #0f4c81; font-weight: 700; }
    .col-cuota { color: #059669; font-weight: 800; }
    .col-interes { color: #ea580c; font-weight: 600; }
    .col-total { color: #7c3aed; font-weight: 800; }

    @media (max-width: 780px) {
      .header-modern { padding: 1rem; flex-direction: column; gap: 0.8rem; text-align: center; }
      .module h1 { font-size: 1.2rem; }
      .financing-table th, .financing-table td { padding: 0.5rem; font-size: 0.7rem; }
      .btn { font-size: 1.1rem; }
      .logo-svg { width: 70px; height: 70px; }
      .logo-text { font-size: 1.3rem; }
    }

    @media print {
      .card-form-modern, .btn-generar, .btn-imprimir, .footer-text, .header-modern .back-btn {
        display: none !important;
      }
      body { background: white; }
      .module.active-module { display: block !important; }
      .tabla-calendario th { background: #0f4c81 !important; color: white !important; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- MENÚ PRINCIPAL -->
  <div id="menuPrincipal" class="menu-container">
    <div class="content-wrapper">
      <div class="logo-area">
        <div class="logo-svg">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" fill="url(#gradCircle)" stroke="#ffffff" stroke-width="2.2" />
            <defs>
              <linearGradient id="gradCircle" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1E3C72" />
                <stop offset="100%" stop-color="#2A5298" />
              </linearGradient>
              <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F9D976" />
                <stop offset="100%" stop-color="#F39F86" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="48" r="20" fill="url(#coinGrad)" stroke="#E6B422" stroke-width="1.5" />
            <text x="50" y="56" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#2c3e4e" text-anchor="middle" dominant-baseline="middle">$</text>
            <path d="M30 72 L45 62 L58 70 L72 54" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="3 2" opacity="0.8" />
          </svg>
        </div>
        <div class="logo-text">San Gaspar</div>
        <div class="logo-sub">elige tu camino financiero</div>
      </div>

      <div class="buttons-group">
        <button id="btnCredito" class="btn btn-credito">
          <span class="btn-icon">💳</span>
          <span>Crédito</span>
        </button>
        <button id="btnAhorros" class="btn btn-ahorros">
          <span class="btn-icon">🏦</span>
          <span>Ahorros</span>
        </button>
      </div>

      <div id="feedbackArea" class="feedback">
        <span>✨</span>
        <span id="feedbackMessage">Selecciona una opción</span>
      </div>
      <div class="footer-note">
        📱 Gestión inteligente | Crédito · Ahorros
      </div>
    </div>
  </div>

  <!-- MÓDULO DE CRÉDITOS -->
  <div id="module-creditos" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">← Volver</button>
      <h1>💰 COTIZADOR DE CRÉDITOS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none';" alt="logo">
    </div>
    <div class="card-form-modern">
      <div class="form-row">
        <div class="input-group">
          <label>💰 MONTO A FINANCIAR</label>
          <input type="text" id="montoCredito" class="field-modern" placeholder="Ej: 10,000" inputmode="decimal">
        </div>
        <div class="input-group">
          <label>📊 TASA DE INTERÉS (MENSUAL)</label>
          <select id="tasaCredito" class="select-modern">
            <option value="24">2.00% PRINCIPAL</option>
            <option value="20">1.67% DEPOSITARIA</option>
            <option value="27.60">2.30% INMEDIATO</option>
          </select>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="financing-table" id="tablaCreditos">
        <thead><tr><th>PLAZO</th><th>CUOTA MENSUAL</th><th>INTERÉS TOTAL</th><th>TOTAL A PAGAR</th></tr></thead>
        <tbody id="tablaBodyCreditos"><tr><td colspan="4" style="text-align:center;">💰 Ingrese un monto</td></tr></tbody>
      </table>
    </div>
    <div class="footer-text">COTIZADOR SG · Tasas referenciales</div>
  </div>

  <!-- MÓDULO DE AHORROS -->
  <div id="module-ahorros" class="module">
    <div class="header-modern">
      <button class="back-btn" onclick="mostrarMenu()">← Volver</button>
      <h1>💰 COTIZADOR DE AHORROS</h1>
      <img src="logo.png" class="logo-small" onerror="this.style.display='none';" alt="logo">
    </div>
    <div class="card-form-modern card-form-ahorros">
      <div class="form-row">
        <div class="input-group">
          <label>🏦 TIPO DE AHORRO</label>
          <select id="productoAhorro" class="select-modern">
            <option value="">Seleccione...</option>
            <option value="corriente">Ahorro Corriente (6% anual)</option>
            <option value="infanto">Ahorro Infanto Juvenil (5% anual)</option>
            <option value="plazofijo">Ahorro a Plazo Fijo</option>
            <option value="plazofijo_pref">Ahorro a Plazo Fijo Preferencial</option>
            <option value="inversion_f1">Inversiones F.I</option>
            <option value="inversion_f2">Inversiones F.II</option>
          </select>
        </div>
        <div class="input-group">
          <label>💰 MONTO A INVERTIR</label>
          <input type="text" id="montoAhorro" class="field-modern" placeholder="Ej: 10,000" inputmode="decimal">
        </div>
        <div class="input-group" id="plazoGroup" style="display:none;">
          <label>⏱️ PLAZO (MESES)</label>
          <select id="plazoAhorro" class="select-modern">
            <option value="6">6 MESES</option>
            <option value="12">12 MESES</option>
            <option value="24">24 MESES</option>
          </select>
        </div>
        <div class="input-group" id="frecuenciaGroup" style="display:none;">
          <label>📅 MODALIDAD</label>
          <select id="frecuenciaAhorro" class="select-modern">
            <option value="mensual">Mensual</option>
            <option value="trimestral">Trimestral</option>
            <option value="semestral">Semestral</option>
            <option value="anual">Anual</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="fechasGroup" style="display:none;">
        <div class="input-group">
          <label>📅 FECHA INICIO</label>
          <input type="date" id="fechaInicioAhorro" class="field-modern">
        </div>
        <div class="input-group">
          <label>📅 FECHA FINAL</label>
          <input type="date" id="fechaFinAhorro" class="field-modern">
        </div>
      </div>
      <button id="btnCalcularAhorro" class="btn-generar">🧮 Generar Cálculos</button>
    </div>

    <div id="resultadosAhorro" style="display:none;">
      <div class="table-container">
        <div id="tablaCalendarioContainer"></div>
        <div id="infoBoxAhorro" class="info-box"></div>
        <button id="btnImprimirAhorro" class="btn-imprimir">🖨️ Imprimir Cotización</button>
      </div>
    </div>
    <div class="footer-text">COTIZADOR SG · ISR 10% aplicado</div>
  </div>
</div>

<script>
  // ==================== NAVEGACIÓN ====================
  const menu = document.getElementById('menuPrincipal');
  const moduleCredito = document.getElementById('module-creditos');
  const moduleAhorro = document.getElementById('module-ahorros');

  function mostrarMenu() {
    menu.style.display = 'flex';
    moduleCredito.classList.remove('active-module');
    moduleAhorro.classList.remove('active-module');
  }

  function mostrarCredito() {
    menu.style.display = 'none';
    moduleCredito.classList.add('active-module');
    moduleAhorro.classList.remove('active-module');
    renderizarTablaCreditos();
    document.getElementById('feedbackMessage').innerText = "💳 Crédito seleccionado";
  }

  function mostrarAhorro() {
    menu.style.display = 'none';
    moduleAhorro.classList.add('active-module');
    moduleCredito.classList.remove('active-module');
    document.getElementById('feedbackMessage').innerText = "🏦 Ahorros seleccionado";
  }

  document.getElementById('btnCredito').addEventListener('click', mostrarCredito);
  document.getElementById('btnAhorros').addEventListener('click', mostrarAhorro);

  // ==================== CRÉDITOS ====================
  const plazosMeses = [12, 18, 24, 36, 48, 60, 72, 84, 96, 108, 120];

  function formatMoney(valor) {
    if (isNaN(valor) || valor === null) return "Q 0.00";
    return "Q " + valor.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function cleanNumber(value) {
    if (!value || value === "") return 0;
    let limpio = String(value).replace(/Q/gi, '').replace(/,/g, '').trim();
    return parseFloat(limpio) || 0;
  }

  function calcularCuotaMensual(monto, tasaAnual, meses) {
    if (monto <= 0 || meses <= 0) return 0;
    const tasaMensual = (tasaAnual / 100) / 12;
    if (tasaMensual === 0) return monto / meses;
    const factor = Math.pow(1 + tasaMensual, meses);
    return monto * (tasaMensual * factor) / (factor - 1);
  }

  function renderizarTablaCreditos() {
    const montoRaw = cleanNumber(document.getElementById("montoCredito").value);
    const tbody = document.getElementById("tablaBodyCreditos");
    if (montoRaw === 0) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">💰 Ingrese un monto</td></tr>`;
      return;
    }
    const tasa = parseFloat(document.getElementById("tasaCredito").value);
    let html = "";
    for (let meses of plazosMeses) {
      const cuota = calcularCuotaMensual(montoRaw, tasa, meses);
      const totalPagar = cuota * meses;
      const interesTotal = totalPagar - montoRaw;
      html += `<tr>
        <td class="col-plazo">${meses} MESES</td>
        <td class="col-cuota">${formatMoney(cuota)}</td>
        <td class="col-interes">${formatMoney(interesTotal)}</td>
        <td class="col-total">${formatMoney(totalPagar)}</td>
      </tr>`;
    }
    tbody.innerHTML = html;
  }

  document.getElementById('montoCredito').addEventListener('input', renderizarTablaCreditos);
  document.getElementById('tasaCredito').addEventListener('change', renderizarTablaCreditos);

  // ==================== AHORROS ====================
  const productosAhorro = {
    corriente: { tasa: 6, min: 100, requiereFechas: true, nombre: "Ahorro Corriente" },
    infanto: { tasa: 5, min: 100, requiereFechas: true, nombre: "Infanto Juvenil" },
    plazofijo: { min: 1000, requiereFechas: false, nombre: "Plazo Fijo", rangos: [{ desde: 1000, hasta: 99999.99, tasas: { 6: 12, 12: 14, 24: 'NA' } }, { desde: 100000, hasta: Infinity, tasas: { 6: 14, 12: 15, 24: 16 } }] },
    plazofijo_pref: { min: 50000, requiereFechas: false, nombre: "Plazo Fijo Preferencial", requiereTabla: true, rangos: [{ desde: 50000, hasta: 99999.99, tasas: { 6: 11, 12: 13, 24: 'NA' } }, { desde: 100000, hasta: Infinity, tasas: { 6: 12, 12: 13, 24: 14 } }], frecuencias: ['mensual', 'trimestral', 'semestral', 'anual'] },
    inversion_f1: { min: 1000000, tasa: 10.5, requiereFechas: false, nombre: "Inversiones F.I" },
    inversion_f2: { min: 1000000, tasa: 10, requiereFechas: false, nombre: "Inversiones F.II", requiereTabla: true, frecuencias: ['mensual', 'trimestral', 'semestral'] }
  };

  let ultimoResultado = null, ultimoProducto = null;

  function agregarMeses(fecha, meses) { const nueva = new Date(fecha); nueva.setMonth(nueva.getMonth() + meses); return nueva; }
  function formatearFecha(fecha) { return fecha.toLocaleDateString('es-GT', { year: 'numeric', month: 'long', day: 'numeric' }); }

  function generarTablaCalendario(r, producto) {
    const config = productosAhorro[producto];
    const frecuencias = { 'mensual': 1, 'trimestral': 3, 'semestral': 6, 'anual': 12 };
    const per = frecuencias[r.frecuencia] || 12;
    const totalPer = Math.floor(r.plazo / per);
    const brutoPer = r.bruto / totalPer;
    const isrPer = r.isr / totalPer;
    const netoPer = r.neto / totalPer;
    let html = `<h4 style="color:#0f4c81;">📅 Calendario de Pagos - ${config.nombre}</h4>
    <table class="tabla-calendario"><thead><tr><th>#</th><th>Fecha</th><th>Interés Bruto</th><th>ISR (10%)</th><th>Interés Neto</th></tr></thead><tbody>`;
    let fecha = new Date();
    for (let i = 1; i <= totalPer; i++) {
      html += `<tr><td>${i}</td><td>${formatearFecha(fecha)}</td><td>${formatMoney(brutoPer)}</td><td style="color:#dc3545;">- ${formatMoney(isrPer)}</td><td style="color:#28a745;">${formatMoney(netoPer)}</td></tr>`;
      fecha = agregarMeses(fecha, per);
    }
    html += `</tbody><tfoot style="background:#e8f4f8;"><tr><td colspan="2"><strong>TOTALES</strong></td><td><strong>${formatMoney(r.bruto)}</strong></td><td><strong>- ${formatMoney(r.isr)}</strong></td><td><strong>${formatMoney(r.neto)}</strong></td></tr></tfoot></table>`;
    return html;
  }

  function calcularAhorro() {
    const producto = document.getElementById('productoAhorro').value;
    if (!producto) { alert('Seleccione un producto'); return; }
    const config = productosAhorro[producto];
    const monto = cleanNumber(document.getElementById('montoAhorro').value);
    if (monto < config.min) { alert(`Monto mínimo ${formatMoney(config.min)}`); return; }
    let resultado = { monto };
    if (producto === 'corriente' || producto === 'infanto') {
      const fechaInicio = new Date(document.getElementById('fechaInicioAhorro').value);
      const fechaFin = new Date(document.getElementById('fechaFinAhorro').value);
      if (isNaN(fechaInicio) || isNaN(fechaFin)) { alert('Verifique fechas'); return; }
      const dias = Math.ceil((fechaFin - fechaInicio) / (1000*60*60*24));
      const bruto = monto * (config.tasa/100) * (dias/365);
      const isr = bruto * 0.10;
      resultado = { ...resultado, tasa: config.tasa, dias, bruto, isr, neto: bruto - isr, total: monto + bruto - isr };
    } else {
      const plazo = parseInt(document.getElementById('plazoAhorro').value);
      let tasaEncontrada = config.tasa;
      if (config.rangos) {
        const rango = config.rangos.find(r => monto >= r.desde && monto <= r.hasta);
        if (!rango) { alert('Monto no aplica'); return; }
        tasaEncontrada = rango.tasas[plazo];
        if (!tasaEncontrada || tasaEncontrada === 'NA') { alert('Plazo no disponible'); return; }
      }
      const bruto = monto * (tasaEncontrada/100) * (plazo/12);
      const isr = bruto * 0.10;
      const frecuencia = config.frecuencias ? document.getElementById('frecuenciaAhorro').value : null;
      resultado = { ...resultado, plazo, tasa: tasaEncontrada, frecuencia, bruto, isr, neto: bruto - isr, total: monto + bruto - isr };
    }
    ultimoResultado = resultado;
    ultimoProducto = producto;
    mostrarResultadoAhorro(resultado, producto);
  }

  function mostrarResultadoAhorro(r, producto) {
    document.getElementById('resultadosAhorro').style.display = 'block';
    const calendarioContainer = document.getElementById('tablaCalendarioContainer');
    const infoBox = document.getElementById('infoBoxAhorro');
    if (productosAhorro[producto].requiereTabla && r.frecuencia && r.plazo) {
      calendarioContainer.innerHTML = generarTablaCalendario(r, producto);
    } else { calendarioContainer.innerHTML = ''; }
    infoBox.innerHTML = `<strong>📊 Detalles del cálculo:</strong><br>
      • Producto: ${productosAhorro[producto].nombre}<br>
      • Monto invertido: ${formatMoney(r.monto)}<br>
      • Tasa anual: ${r.tasa}%<br>
      • Interés bruto: ${formatMoney(r.bruto)}<br>
      • ISR (10%): -${formatMoney(r.isr)}<br>
      • Interés neto: ${formatMoney(r.neto)}<br>
      • <strong>Total al vencimiento: ${formatMoney(r.total)}</strong>`;
  }

  function imprimirAhorro() {
    if (!ultimoResultado) { alert('Genere la cotización primero'); return; }
    window.print();
  }

  function actualizarCamposAhorro() {
    const producto = document.getElementById('productoAhorro').value;
    const plazoGroup = document.getElementById('plazoGroup');
    const frecuenciaGroup = document.getElementById('frecuenciaGroup');
    const fechasGroup = document.getElementById('fechasGroup');
    plazoGroup.style.display = 'none';
    frecuenciaGroup.style.display = 'none';
    fechasGroup.style.display = 'none';
    document.getElementById('resultadosAhorro').style.display = 'none';
    if (!producto) return;
    const config = productosAhorro[producto];
    if (producto === 'corriente' || producto === 'infanto') {
      fechasGroup.style.display = 'flex';
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fechaInicioAhorro').value = hoy;
      let fechaFin = new Date(); fechaFin.setMonth(fechaFin.getMonth() + 12);
      document.getElementById('fechaFinAhorro').value = fechaFin.toISOString().split('T')[0];
    } else {
      plazoGroup.style.display = 'flex';
      if (config.frecuencias) frecuenciaGroup.style.display = 'flex';
    }
  }

  document.getElementById('productoAhorro').addEventListener('change', actualizarCamposAhorro);
  document.getElementById('btnCalcularAhorro').addEventListener('click', calcularAhorro);
  document.getElementById('btnImprimirAhorro').addEventListener('click', imprimirAhorro);

  // Inicializar
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('montoCredito').value = '';
    document.getElementById('montoAhorro').value = '';
    renderizarTablaCreditos();
    actualizarCamposAhorro();
    mostrarMenu();
  });
</script>
</body>
</html>
