<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizador - San Gaspar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #003366; --primary-light: #004d99; --accent: #0056b3;
      --bg: #f4f6f9; --card-bg: #ffffff; --text: #2c3e50; --text-light: #6c757d;
      --shadow: 0 4px 12px rgba(0,0,0,0.08); --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* HEADER */
    .app-header { background: var(--primary); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .app-header h1 { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    .user-badge { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
    .logout-btn { background: none; border: none; color: white; cursor: pointer; font-size: 1rem; margin-left: 6px; opacity: 0.8; transition: 0.2s; }
    .logout-btn:hover { opacity: 1; transform: scale(1.1); }
    
    /* MAIN LAYOUT */
    .main-container { flex: 1; display: flex; padding: 24px; gap: 24px; }
    .sidebar { width: 240px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 0; display: flex; flex-direction: column; }
    .nav-item { padding: 14px 24px; display: flex; align-items: center; gap: 12px; color: var(--text-light); transition: 0.2s; border-left: 4px solid transparent; text-decoration: none; }
    .nav-item:hover, .nav-item.active { background: #f8f9fa; color: var(--primary); border-left-color: var(--accent); }
    .nav-item i { width: 20px; text-align: center; }
    .content { flex: 1; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
    
    /* COTIZADOR STYLES */
    .module-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .module-header h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .module-header p { opacity: 0.9; font-size: 0.9rem; }
    .cotizador-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; position: relative; overflow: hidden; }
    
    /* MARCA DE AGUA */
    .watermark-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      opacity: 0.08; pointer-events: none; z-index: 1;
      font-size: 3rem; font-weight: 900; color: var(--primary);
      white-space: nowrap; user-select: none; text-transform: uppercase;
      letter-spacing: 4px;
    }
    
    .card-form { background: var(--primary); color: white; padding: 20px; border-radius: var(--radius); margin-bottom: 20px; position: relative; z-index: 2; }
    .card-form label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; opacity: 0.95; }
    .field, .select { width: 100%; height: 48px; padding: 0 16px; border-radius: 8px; border: none; outline: none; font-size: 1rem; margin-bottom: 16px; background: #fff; color: var(--text); }
    .field:focus, .select:focus { box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
    
    .export-card { background: #f8f9fa; border-radius: var(--radius); padding: 16px; position: relative; z-index: 2; }
    .result-item { background: white; padding: 16px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; z-index: 2; }
    .result-item:last-child { margin-bottom: 0; }
    
    .result-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .result-left { flex: 1; }
    .result-months { font-size: 0.85rem; color: var(--text-light); font-weight: 600; margin-bottom: 4px; }
    .result-payment { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 700; color: var(--primary); }
    .result-right { text-align: right; min-width: 130px; }
    .result-meta-line { font-size: 0.85rem; color: var(--text-light); margin-bottom: 2px; }
    .result-meta-line strong { color: var(--text); }
    
    .footer-text { text-align: center; font-size: 0.7rem; color: var(--text-light); margin-top: 12px; opacity: 0.7; position: relative; z-index: 2; }
    .acciones { margin-top: 20px; position: sticky; bottom: 20px; z-index: 10; }
    #share { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-weight: 600; font-size: 1rem; color: white; background: var(--accent); cursor: pointer; box-shadow: var(--shadow); transition: 0.2s; }
    #share:hover { filter: brightness(1.05); }
    
    /* FOOTER */
    .app-footer { text-align: center; padding: 16px; color: var(--text-light); font-size: 0.8rem; border-top: 1px solid #eee; background: var(--card-bg); }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .main-container { flex-direction: column; padding: 16px; }
      .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px 0; }
      .nav-item { padding: 12px 16px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
      .nav-item:hover, .nav-item.active { border-left-color: transparent; border-bottom-color: var(--accent); }
      .result-row { flex-direction: column; align-items: flex-start; }
      .result-right { text-align: left; width: 100%; display: flex; justify-content: space-between; background: rgba(0,0,0,0.03); padding: 8px 10px; border-radius: 6px; margin-top: 8px; }
      .watermark-text { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1><i class="fas fa-building"></i> COOPERATIVA SAN GASPAR</h1>
    <div class="user-badge">
      <i class="fas fa-user-circle"></i> 
      <span id="displayUser">Usuario</span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <div class="main-container">
    <nav class="sidebar" id="sidebar"></nav>

    <main class="content">
      <div class="module-header">
        <h2>🧮 Cotizador SG</h2>
        <p>Calcula montos, plazos e intereses de forma rápida</p>
      </div>

      <div id="areaCompartir" class="cotizador-card">
        <div class="watermark-text">SAN GASPAR</div>
        
        <div class="card-form">
          <label for="monto">MONTO</label>
          <input id="monto" class="field" type="text" inputmode="decimal" placeholder="Ingrese monto">
          <label for="tasa">TASA</label>
          <select id="tasa" class="select">
            <option value="24.1">2.00% M PRINCIPAL</option>
            <option value="20.1">1.67% M DEPOSITARIA</option>
            <option value="20.1">1.67% M MASVI</option>
            <option value="27.61">2.30% M INMEDIATO</option>
          </select>
        </div>

        <div class="export-card">
          <div id="resultados"></div>
        </div>
        <div class="footer-text">COTIZADOR SG v3.0 - INTEGRADO</div>
      </div>

      <div class="acciones">
        <button id="share">📤 Compartir Cotización</button>
      </div>
    </main>
  </div>

  <footer class="app-footer">© 2026 Cooperativa San Gaspar | Panel de Aplicaciones</footer>

  <script>
    // ==================== SESIÓN ====================
    const currentUser = sessionStorage.getItem('currentUser');
    if (!currentUser) window.location.href = 'login.html';
    
    const users = JSON.parse(localStorage.getItem('users')) || {};
    const myModules = (users[currentUser] || { modules: [] }).modules || [];
    
    document.getElementById('displayUser').textContent = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
    
    function logout() {
      sessionStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    }

    // ==================== SIDEBAR DINÁMICO (ACTUALIZADO) ====================
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      
      let html = `<a href="index.html" class="nav-item"><i class="fas fa-home"></i> Inicio</a>`;
      
      if (myModules.includes('all') || myModules.includes('cotizador')) {
        html += `<a href="cotizador.html" class="nav-item active"><i class="fas fa-calculator"></i> Cotizador</a>`;
      }
      
      if (myModules.includes('all') || myModules.includes('consentimiento')) {
        html += `<a href="consentimiento.html" class="nav-item"><i class="fas fa-file-contract"></i> Consentimiento</a>`;
      }
      
      // 🔥 AGREGADO: Enlace de Ahorros
      if (myModules.includes('all') || myModules.includes('ahorros')) {
        html += `<a href="ahorros.html" class="nav-item"><i class="fas fa-piggy-bank"></i> Ahorros</a>`;
      }
      
      if (myModules.includes('all')) {
        html += `<a href="admin.html" class="nav-item"><i class="fas fa-cogs"></i> Admin</a>`;
      }
      
      sidebar.innerHTML = html;
    }
    renderSidebar();

    // ==================== LÓGICA DEL COTIZADOR ====================
    const montoInput = document.getElementById("monto");
    const tasaSelect = document.getElementById("tasa");
    const resultados = document.getElementById("resultados");
    const btnShare = document.getElementById("share");
    const plazos = [12, 18, 24, 36, 48, 60, 72, 84, 96, 108, 120];

    function limpiar(valor) { return String(valor).replace(/Q/gi, "").replace(/,/g, "").trim(); }
    function formato(valor) { return "Q " + Number(valor).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function calcular(monto, tasa, MESES) {
      if (!monto || monto <= 0) return 0;
      const i = (tasa / 100) / 12;
      return monto * (i / (1 - Math.pow(1 + i, -MESES)));
    }

    function render() {
      const monto = parseFloat(limpiar(montoInput.value)) || 0;
      const tasa = parseFloat(tasaSelect.value) || 0;
      resultados.innerHTML = "";
      plazos.forEach(MESES => {
        const cuota = calcular(monto, tasa, MESES);
        const total = cuota * MESES;
        const interes = total - monto;
        const div = document.createElement("div");
        div.className = "result-item";
        div.innerHTML = `
          <div class="result-row">
            <div class="result-left">
              <div class="result-months">${MESES} MESES</div>
              <div class="result-payment">${formato(cuota)}</div>
            </div>
            <div class="result-right">
              <div class="result-meta-line">INTERÉS: ${formato(interes)}</div>
              <div class="result-meta-line"><strong>TOTAL: ${formato(total)}</strong></div>
            </div>
          </div>`;
        resultados.appendChild(div);
      });
    }

    montoInput.addEventListener("blur", () => {
      const monto = parseFloat(limpiar(montoInput.value)) || 0;
      montoInput.value = monto > 0 ? "Q " + monto.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "";
      render();
    });
    montoInput.addEventListener("input", render);
    tasaSelect.addEventListener("change", render);

    btnShare.addEventListener("click", async () => {
      const area = document.getElementById("areaCompartir");
      const canvas = await html2canvas(area, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
      canvas.toBlob(blob => {
        const link = document.createElement('a');
        link.download = 'Cotizacion-SG.png';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    });
    render();
  </script>
</body>
</html>
